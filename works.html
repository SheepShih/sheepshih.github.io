<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Works (2022~) | Shih Ting Fang 施婷方 | Portfolio</title>
<link rel="icon" type="image/png" href="assets/img/favicon.png?v=1">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png?v=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bentham&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pc-deco.css?v=44">
<style>
  :root { --diner-bg: #DF9079; --paper: #F5E9CA; }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--diner-bg);
    font-family: "Bentham", serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
  }

  /* topページのドア画像と同じサイズ・位置の枠(中に「準備中」の店内) */
  .works-frame {
    position: relative;
    width: min(100vw, 430px);
    aspect-ratio: 768 / 1376;
    max-height: 100dvh;
    overflow: hidden;
    cursor: pointer; /* シーン全体をタップでトップへ戻れる(ボタンは非表示) */
  }

  .works-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 切替時の「溶ける」登場エフェクト: 歪ませたシーンがドロッと固まっていく */
  .works-frame.melting {
    filter: url(#meltFilter);
    animation: melt-fade 1.4s ease both;
  }
  @keyframes melt-fade {
    0%   { opacity: 0.15; }
    35%  { opacity: 1; }
    100% { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .works-frame.melting { filter: none; animation: none; }
  }
</style>
</head>
<body>

<!-- 「溶ける」用のSVGフィルター(タービュランス+ディスプレイスメント) -->
<svg class="melt-defs" width="0" height="0" aria-hidden="true" focusable="false">
  <defs>
    <filter id="meltFilter" x="-15%" y="-15%" width="130%" height="150%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.006" numOctaves="2" seed="6" result="turb">
        <animate id="meltFreq" attributeName="baseFrequency" dur="1.4s" keyTimes="0;1"
                 values="0.009 0.03; 0.009 0.006" fill="freeze" begin="indefinite"
                 calcMode="spline" keySplines="0.16 1 0.3 1"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="0"
                         xChannelSelector="R" yChannelSelector="G">
        <animate id="meltScale" attributeName="scale" dur="1.4s" keyTimes="0;1"
                 values="190;0" fill="freeze" begin="indefinite"
                 calcMode="spline" keySplines="0.16 1 0.3 1"/>
      </feDisplacementMap>
    </filter>
  </defs>
</svg>

<div class="works-frame" id="worksFrame" role="link" tabindex="0" aria-label="トップへ戻る">
  <img class="works-img" src="assets/img/works-closed.webp?v=3" alt="Shih Ting Fang Diner — Works (2022~) は準備中です">
</div>

<!-- PC幅のみの装飾は pc-deco.js が注入する(index/about/works共通) -->
<script src="pc-deco.js?v=25"></script>

<script>
(function () {
  var frame = document.getElementById("worksFrame");

  // 登場時に「溶ける」エフェクトを再生。画像が用意できてから、CSSアニメと
  // SVGアニメ(ディスプレイスメント)を同時に開始する。終わったらフィルターを外す。
  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var img = frame.querySelector(".works-img");
  function startMelt() {
    frame.classList.add("melting");
    var freq = document.getElementById("meltFreq");
    var scale = document.getElementById("meltScale");
    if (freq && freq.beginElement) { freq.beginElement(); }
    if (scale && scale.beginElement) { scale.beginElement(); }
    frame.addEventListener("animationend", function () {
      frame.classList.remove("melting");
    }, { once: true });
  }
  if (!reduceMotion) {
    if (img.complete && img.naturalWidth > 0) { startMelt(); }
    else { img.addEventListener("load", startMelt, { once: true }); }
  }

  var goHome = function () { window.location.href = "index.html"; };
  frame.addEventListener("click", goHome);
  frame.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goHome(); }
  });
})();
</script>
</body>
</html>
